[tox]
minversion = 4.0
envlist =
    py310-sk132
    py310-sk142
    py310-sk152
    py310-sk161
    py310-sk172
    py310-sk180
    py311-sk161
    py312-sk161
    py312-sk180
    py130-sk161
    py130-sk180
    py140-sk161
    py140-sk180

[testenv]
description = Run tests with pytest
deps =
    pytest
    sk132: scikit-learn==1.3.2
    sk142: scikit-learn==1.4.2
    sk152: scikit-learn==1.5.2
    sk161: scikit-learn==1.6.1
    sk172: scikit-learn==1.7.2
    sk180: scikit-learn==1.8.0


commands =
    pytest

# skip if Python version is too low
